name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run test:adapters
      - run: npm run test:enterprise-manager-build-adapter
      - run: npm run test:security-adapter
      - run: npm run test:release-information-adapter
      - run: npm run test:lifecycle-adapter
      - run: npm run test:kev-adapter
      - run: npm run validate:catalog
      - run: npm run build
