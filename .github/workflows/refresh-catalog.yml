name: Refresh catalog

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:adapters
      - run: npm run refresh:catalog -- --live
      - name: Open a catalog refresh pull request when data changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: refresh VBR build catalog'
          title: 'chore: refresh VBR build catalog'
          body: 'Automated, fixture-validated refresh of the VBR build-number catalog. Review the source-linked diff before merging.'
          branch: automation/vbr-catalog-refresh
          delete-branch: true
