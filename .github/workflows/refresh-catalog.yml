name: Refresh catalog

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:adapters
      - run: npm run test:product-build-adapter
      - run: npm run test:enterprise-manager-build-adapter
      - run: npm run test:security-adapter
      - run: npm run test:release-security-adapter
      - run: npm run test:release-information-adapter
      - run: npm run test:release-material-adapter
      - run: npm run test:lifecycle-adapter
      - run: npm run test:kev-adapter
      - run: npm run refresh:catalog -- --live
      - name: Commit a validated catalog refresh when data changed
        run: |
          git add src/data/catalog.snapshot.json
          git diff --cached --quiet && exit 0
          git config user.name 'upgrade-brief[bot]'
          git config user.email 'upgrade-brief[bot]@users.noreply.github.com'
          git commit -m 'chore: refresh Veeam source catalog'
          git push origin HEAD:main
